version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies
      - npm ci
      - npx playwright install --with-deps

  pre_build:
    commands:
      - echo Running lint or pre-checks
      - npm run lint || true

  build:
    commands:
      - echo Running tests
      - npx playwright test

  post_build:
    commands:
      - echo Build completed

artifacts:
  files:
    - playwright-report/**/*
    - test-results/**/*
